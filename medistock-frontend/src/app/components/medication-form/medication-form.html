<div class="form-card">
  <h2>{{ isEditMode ? 'Edit Medication' : 'Add Medication' }}</h2>

  <form (ngSubmit)="submit()">
    <div class="grid">

      <div class="field">
        <label for="code">Code *</label>
        <input id="code" name="code" [(ngModel)]="model.code" placeholder="e.g. MED-001" required />
      </div>

      <div class="field">
        <label for="name">Name *</label>
        <input id="name" name="name" [(ngModel)]="model.name" placeholder="Medication name" required />
      </div>

      <div class="field">
        <label for="genericName">Generic Name</label>
        <input id="genericName" name="genericName" [(ngModel)]="model.genericName" placeholder="Generic / INN name" />
      </div>

      <div class="field">
        <label for="category">Category *</label>
        <input id="category" name="category" [(ngModel)]="model.category" placeholder="e.g. Antibiotic" required />
      </div>

      <div class="field">
        <label for="therapeuticClass">Therapeutic Class</label>
        <input id="therapeuticClass" name="therapeuticClass" [(ngModel)]="model.therapeuticClass" placeholder="e.g. Analgesic" />
      </div>

      <div class="field">
        <label for="form">Form</label>
        <select id="form" name="form" [(ngModel)]="model.form">
          <option value="">-- Select form --</option>
          <option *ngFor="let f of formOptions.forms" [value]="f">{{ f }}</option>
        </select>
      </div>

      <div class="field">
        <label for="concentration">Concentration</label>
        <input id="concentration" name="concentration" [(ngModel)]="model.concentration" placeholder="e.g. 500" />
      </div>

      <div class="field">
        <label for="unit">Unit</label>
        <input id="unit" name="unit" [(ngModel)]="model.unit" placeholder="e.g. mg, ml" />
      </div>

      <div class="field">
        <label for="criticality">Criticality</label>
        <select id="criticality" name="criticality" [(ngModel)]="model.criticality">
          <option value="">-- Select criticality --</option>
          <option *ngFor="let c of formOptions.criticalities" [value]="c">{{ c }}</option>
        </select>
      </div>

      <div class="field">
        <label for="storageType">Required Storage Type</label>
        <select id="storageType" name="requiredStorageType" [(ngModel)]="model.requiredStorageType">
          <option value="">-- Select storage --</option>
          <option *ngFor="let s of formOptions.storageTypes" [value]="s">{{ s }}</option>
        </select>
      </div>

      <div class="field">
        <label for="dailyUsage">Standard Daily Usage / Patient</label>
        <input id="dailyUsage" type="number" step="0.01" min="0" name="standardDailyUsagePerPatient"
          [(ngModel)]="model.standardDailyUsagePerPatient" placeholder="e.g. 2.5" />
      </div>

      <div class="field">
        <label for="minBuffer">Min Buffer Days</label>
        <input id="minBuffer" type="number" step="1" min="0" name="defaultMinBufferDays"
          [(ngModel)]="model.defaultMinBufferDays" placeholder="e.g. 7" />
      </div>

      <div class="field">
        <label for="targetBuffer">Target Buffer Days</label>
        <input id="targetBuffer" type="number" step="1" min="0" name="defaultTargetBufferDays"
          [(ngModel)]="model.defaultTargetBufferDays" placeholder="e.g. 30" />
      </div>

      <div class="field checkbox-field">
        <label>
          <input type="checkbox" name="controlledSubstance" [(ngModel)]="model.controlledSubstance" />
          Controlled Substance
        </label>
      </div>

      <div class="field checkbox-field">
        <label>
          <input type="checkbox" name="isActive" [(ngModel)]="model.isActive" />
          Active
        </label>
      </div>

    </div>

    @if (validationError || backendError) {
    <div class="error-message">
      {{ validationError || backendError }}
    </div>
    }

    <div class="form-actions">
      <button type="submit">
        {{ isEditMode ? 'Update' : 'Add' }}
      </button>

      @if (isEditMode) {
      <button type="button" (click)="cancel()">
        Cancel
      </button>
      }
    </div>
  </form>
</div>
