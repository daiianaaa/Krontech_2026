<div class="form-card">
    <h2>{{ isEditMode ? 'Edit Medication' : 'Add Medication' }}</h2>
  
    <form (ngSubmit)="submit()">
      <div class="grid">
        <input name="name" [(ngModel)]="model.name" placeholder="Name" required />
  
        <input name="category" [(ngModel)]="model.category" placeholder="Category" required />
  
        <input type="number" name="stock" [(ngModel)]="model.stock" placeholder="Stock" required />
  
        <input type="date" name="expiryDate" [(ngModel)]="model.expiryDate" required />
  
        <input name="batchNumber" [(ngModel)]="model.batchNumber" placeholder="Batch Number" required />
  
        <input type="number" step="0.01" name="price" [(ngModel)]="model.price" placeholder="Price (RON)" required />
  
        <input name="supplier" [(ngModel)]="model.supplier" placeholder="Supplier" required />
      </div>
  
      @if (validationError) {
        <div class="error-message" style="color: red; margin-bottom: 1rem; font-weight: bold;">
          {{ validationError }}
        </div>
      }
  
      <button type="submit">
        {{ isEditMode ? 'Update' : 'Add' }}
      </button>
  
      @if (isEditMode) {
      <button type="button" (click)="cancel()">
        Cancel
      </button>
      }
    </form>
  </div>
